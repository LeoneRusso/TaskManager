<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <style>
        /* Add your styles here */
    </style>
</head>
<body>
    <h1>Task Manager</h1>
    <div id="auth-status"></div>
    <div id="login-form">
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <button id="login-btn">Login</button>
        <button id="signup-btn">Sign Up</button>
    </div>
    <div id="task-form" style="display: none;">
        <input type="text" id="task-name" placeholder="Task Name" required>
        <input type="time" id="start-time" required>
        <input type="time" id="end-time" required>
        <button id="add-task-btn">Add Task</button>
        <div id="save-status"></div>
    </div>
    <div id="task-list"></div>
    <div id="agenda-view"></div>
    <script>
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginButton = document.getElementById('login-btn');
        const signupButton = document.getElementById('signup-btn');
        const taskForm = document.getElementById('task-form');
        const taskNameInput = document.getElementById('task-name');
        const startTimeInput = document.getElementById('start-time');
        const endTimeInput = document.getElementById('end-time');
        const addTaskButton = document.getElementById('add-task-btn');
        const taskList = document.getElementById('task-list');
        const agendaView = document.getElementById('agenda-view');
        const saveStatus = document.getElementById('save-status');
        const authStatus = document.getElementById('auth-status');

        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
        let loggedInUser = localStorage.getItem('loggedInUser');

        function updateAuthStatus() {
            if (loggedInUser) {
                authStatus.innerHTML = `<p>Logged in as ${loggedInUser} <button id='logout-btn'>Logout</button></p>`;
                taskForm.style.display = 'block';
                displayTasks();
            } else {
                authStatus.innerHTML = `<p>Please log in</p>`;
                taskForm.style.display = 'none';
            }
        }

        function displayTasks() {
            taskList.innerHTML = '';
            tasks.forEach((task, index) => {
                const duration = calculateDuration(task.startTime, task.endTime);
                taskList.innerHTML += `<div>${task.name} (${duration}) <button onclick='removeTask(${index})'>Remove</button></div>`;
            });
            displayAgendaView();
        }

        function calculateDuration(startTime, endTime) {
            const start = new Date(`1970-01-01T${startTime}`);
            const end = new Date(`1970-01-01T${endTime}`);
            const durationMins = (end - start) / 60000;
            const hours = Math.floor(durationMins / 60);
            const minutes = durationMins % 60;
            return `${startTime} - ${endTime} (${hours}h ${minutes}m)`;
        }

        function displayAgendaView() {
            agendaView.innerHTML = '';
            const groupedTasks = {};
            tasks.forEach(task => {
                const start = task.startTime.split(':')[0];
                if (!groupedTasks[start]) {
                    groupedTasks[start] = [];
                }
                groupedTasks[start].push(task);
            });
            for (const key in groupedTasks) {
                agendaView.innerHTML += `<h2>${key}:00</h2>`;
                groupedTasks[key].forEach(task => {
                    agendaView.innerHTML += `<div>${task.name}</div>`;
                });
            }
        }

        function removeTask(index) {
            tasks.splice(index, 1);
            saveTasks();
        }

        function saveTasks() {
            localStorage.setItem('tasks', JSON.stringify(tasks));
            saveStatus.innerHTML = 'Tasks saved successfully!';
            setTimeout(() => saveStatus.innerHTML = '', 2000);
        }

        addTaskButton.onclick = () => {
            const task = {
                name: taskNameInput.value,
                startTime: startTimeInput.value,
                endTime: endTimeInput.value
            };
            tasks.push(task);
            taskNameInput.value = '';
            startTimeInput.value = '';
            endTimeInput.value = '';
            saveTasks();
        };

        loginButton.onclick = () => {
            const email = emailInput.value;
            const password = passwordInput.value;
            // Simplified login/signup logic with localStorage
            if (!loggedInUser) {
                localStorage.setItem('loggedInUser', email);
                loggedInUser = email;
                updateAuthStatus();
            }
        };

        signupButton.onclick = () => {
            const email = emailInput.value;
            const password = passwordInput.value;
            // Implement sign-up logic here
            // For simplicity, using the same logic as login
            localStorage.setItem('loggedInUser', email);
            loggedInUser = email;
            updateAuthStatus();
        }; 

        document.addEventListener('click', (e) => {
            if (e.target.id === 'logout-btn') {
                localStorage.removeItem('loggedInUser');
                loggedInUser = null;
                updateAuthStatus();
            }
        });

        setInterval(saveTasks, 5000);
        updateAuthStatus();
    </script>
</body>
</html>
